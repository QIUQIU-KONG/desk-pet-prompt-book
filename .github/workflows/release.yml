name: Windows Beta Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-beta:
    name: Build and publish Windows Beta
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch protected main
        shell: pwsh
        run: git fetch origin main:refs/remotes/origin/main

      - name: Verify release identity and source
        run: pnpm run release:verify-tag -- "${{ github.ref_name }}"

      - name: Check syntax
        run: pnpm run check:syntax

      - name: Run tests
        run: pnpm test

      - name: Check repository readiness
        run: pnpm run readiness

      - name: Audit high-severity vulnerabilities
        run: pnpm audit --audit-level high --registry https://registry.npmjs.org

      - name: Build unsigned NSIS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm run build:win

      - name: Prepare release checksum
        run: pnpm run release:prepare-assets

      - name: Verify release assets
        run: pnpm run release:verify-assets

      - name: Upload recoverable workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-beta-${{ github.ref_name }}
          path: |
            dist/Desk-Pet-Prompt-Book-Setup-0.1.0-beta.1.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Pre-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $expectedAssets = @(
            'Desk-Pet-Prompt-Book-Setup-0.1.0-beta.1.exe',
            'SHA256SUMS.txt'
          )

          try {
            gh release create $tag `
              'dist/Desk-Pet-Prompt-Book-Setup-0.1.0-beta.1.exe' `
              'dist/SHA256SUMS.txt' `
              --verify-tag `
              --draft `
              --title 'Desk Pet Prompt Book v0.1.0-beta.1' `
              --notes-file 'docs/releases/v0.1.0-beta.1.md'

            $actualAssets = @(gh release view $tag --json assets --jq '.assets[].name')
            if ($actualAssets.Count -ne $expectedAssets.Count) {
              throw "Draft release contains $($actualAssets.Count) assets; expected $($expectedAssets.Count)."
            }
            foreach ($asset in $expectedAssets) {
              if ($actualAssets -notcontains $asset) {
                throw "Draft release is missing expected asset: $asset"
              }
            }

            gh release edit $tag --draft=false --prerelease
          } catch {
            gh release delete $tag --yes 2>$null
            throw
          }
